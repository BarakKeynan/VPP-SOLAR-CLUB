<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPP Solar Club | Own the Grid</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; 
            --bg: #030812;
            --text: #e0e6ed;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Navbar */
        nav {
            background: rgba(3, 8, 18, 0.9);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }

        .nav-logo img { height: 40px; }

        /* Hero Section - המראה הנקי שאהבת */
        header {
            padding: 8rem 5%;
            text-align: center;
            background: radial-gradient(circle at center, #0a192f 0%, #030812 100%);
        }

        .hero-logo-img {
            max-width: 650px;
            width: 90%;
            margin-bottom: 2rem;
        }

        .tagline { 
            font-size: 1.8rem; 
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 3rem;
        }

        .cta-button {
            background: #00d2ff;
            color: #030812;
            padding: 1rem 2.5rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .container { max-width: 1100px; margin: auto; padding: 4rem 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        [dir="rtl"] { text-align: right; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">
        <img src="vpp_logo.jpg" alt="VPP Logo">
    </div>
    <button onclick="toggleLanguage()" style="background:none; color:#00d2ff; border:1px solid #00d2ff; padding:5px 15px; border-radius:20px; cursor:pointer;">עברית</button>
</nav>

<header>
    <img src="vpp_logo.jpg" alt="VPP Solar Club" class="hero-logo-img">
    <p id="tagline" class="tagline">The Decentralized Energy Network Effect</p>
    <a href="mailto:Barak.keynan@gmail.com" class="cta-button">Contact Founders</a>
</header>

<div class="container">
    <div class="grid">
        <div class="card">
            <i class="fas fa-shield-alt" style="color:#00d2ff; font-size:2rem; margin-bottom:1rem;"></i>
            <h3>Energy Sovereignty</h3>
            <p>Strategic energy resilience for local communities.</p>
        </div>
        <div class="card">
            <i class="fas fa-network-wired" style="color:#00d2ff; font-size:2rem; margin-bottom:1rem;"></i>
            <h3>The Network Effect</h3>
            <p>Scale increases collective trading power.</p>
        </div>
        <div class="card">
            <i class="fas fa-microchip" style="color:#00d2ff; font-size:2rem; margin-bottom:1rem;"></i>
            <h3>AI Switchboard</h3>
            <p>Precision AI trading for maximum ROI.</p>
        </div>
    </div>
</div>

<script>
    function toggleLanguage() {
        const h = document.getElementById('html-tag');
        const isEn = h.getAttribute('lang') === 'en';
        h.setAttribute('lang', isEn ? 'he' : 'en');
        h.setAttribute('dir', isEn ? 'rtl' : 'ltr');
        document.getElementById('tagline').innerText = isEn ? 'אפקט הרשת של האנרגיה המבוזרת' : 'The Decentralized Energy Network Effect';
    }
</script>

</body>
</html>
