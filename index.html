<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPP Solar Club | Own the Grid</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #030812;
            color: #e0e6ed;
            text-align: center;
        }
        .container {
            padding: 60px 20px;
            max-width: 900px;
            margin: auto;
        }
        .hero-logo {
            max-width: 600px;
            width: 90%;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.4));
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #ffffff;
        }
        .description {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: rgba(255,255,255,0.8);
        }
        .cta-group {
            margin-bottom: 50px;
        }
        .cta-button {
            display: inline-block;
            background: #00d2ff;
            color: #030812;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            margin: 10px;
            transition: 0.3s;
        }
        .cta-button.secondary {
            background: transparent;
            color: #00d2ff;
            border: 2px solid #00d2ff;
        }
        .video-container {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 210, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
    </style> </head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/vKs2HdW/VPP-LOGO.png" alt="VPP Solar Club" class="hero-logo">
        
        <h1>The Decentralized Energy Network Effect</h1>
        
        <p class="description">
            Connecting local solar assets into a unified Virtual Power Plant. 
            We leverage AI and real-time trading to maximize energy ROI.
        </p>

        <div class="cta-group">
            <a href="https://vppsolarclub.base44.app" target="_blank" class="cta-button">
                <i class="fas fa-rocket"></i> Launch App Demo
            </a>
            <a href="mailto:Barak.keynan@gmail.com" class="cta-button secondary">
                <i class="fas fa-envelope"></i> Contact Founders
            </a>
        </div>

        <div class="video-container">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/A13HuAeMcAU" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

</body>
</html>
