<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPP Solar Club</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #030812; /* הרקע השחור שאתה רואה */
            color: #e0e6ed;
            text-align: center;
        }
        .container { padding: 50px 20px; }
        .logo { max-width: 500px; width: 90%; margin-bottom: 30px; }
        .cta-button {
            display: inline-block;
            background: #00d2ff;
            color: #030812;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            margin: 10px;
        }
        .video-container {
            max-width: 800px;
            margin: 40px auto;
            border: 1px solid #00d2ff;
            border-radius: 15px;
            overflow: hidden;
        }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/vKs2HdW/VPP-LOGO.png" alt="VPP Solar Club" class="logo">
        
        <h1>The Decentralized Energy Network Effect</h1>
        <p>Connecting local solar assets into a unified Virtual Power Plant.</p>

        <div class="cta-group">
            <a href="https://vppsolarclub.base44.app" target="_blank" class="cta-button">Launch App Demo</a>
            <a href="mailto:Barak.keynan@gmail.com" class="cta-button" style="background:none; border:2px solid #00d2ff; color:#00d2ff;">Contact Us</a>
        </div>

        <div class="video-container">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/A13HuAeMcAU" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

</body>
</html>
