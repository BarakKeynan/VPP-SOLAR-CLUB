<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPP Solar Club | Own the Grid</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; 
            --accent: #3a7bd5;
            --bg: #030812;
            --nav-bg: rgba(10, 25, 47, 0.95);
            --text: #e0e6ed;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        [dir="rtl"] { text-align: right; }

        /* --- המלבן העליון (Navbar) --- */
        nav {
            backdrop-filter: blur(15px);
            background: var(--nav-bg);
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
        }

        .nav-logo img { height: 40px; filter: drop-shadow(0 0 5px var(--primary)); }

        .lang-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .lang-btn:hover { background: var(--primary); color: #000; }

        /* --- Hero Section --- */
        header {
            padding: 6rem 5% 4rem;
            text-align: center;
            background: radial-gradient(circle at center, #0a192f 0%, #030812 100%);
        }

        .hero-logo-img {
            max-width: 600px;
            width: 85%;
            margin-bottom: 2.5rem;
            filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.4));
        }

        .tagline { 
            font-size: 1.8rem; 
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            margin-bottom: 3rem;
            letter-spacing: 1px;
        }

        /* כפתורים משודרגים */
        .cta-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 4rem;
        }

        .cta-button {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            padding: 1.1rem 2.8rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .cta-button:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0, 210, 255, 0.4); }

        .cta-button.secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: none;
        }

        /* --- וידאו מוטמע --- */
        .video-section { max-width: 850px; margin: 0 auto 5rem; padding: 0 5%; }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* --- כרטיסי תכונות --- */
        .container { max-width: 1100px; margin: auto; padding: 4rem 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2.5rem; }
        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s;
            text-align: center;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); background: rgba(0, 210, 255, 0.05); }
        .card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 1.5rem; }
        .card h3 { font-family: 'Orbitron', sans-serif; color: #fff; margin-bottom: 1rem; }
