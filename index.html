<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPP Solar Club | Own the Grid</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; 
            --bg: #030812;
            --text: #e0e6ed;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        [dir="rtl"] { text-align: right; }

        /* Navbar */
        nav {
            background: rgba(3, 8, 18, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }

        .nav-logo img { height: 40px; }

        /* Hero Section */
        header {
            padding: 5rem 5% 3rem;
            text-align: center;
            background: radial-gradient(circle at center, #0a192f 0%, #030812 100%);
        }

        .hero-logo-img {
            max-width: 600px;
            width: 85%;
            margin-bottom: 2.5rem;
            filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.4));
        }

        .tagline { 
            font-size: 2.2rem; 
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .description {
            max-width: 800px;
            margin: 0 auto 3rem;
            font-size: 1.2rem;
            color: rgba(224, 230, 237, 0.8);
        }

        /* Buttons */
        .cta-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 4rem;
        }

        .cta-button {
            background: var(--primary);
            color: #030812;
            padding: 1.1rem 2.5rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.5);
        }

        .cta-button.secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: none;
        }

        /* Video Wrapper */
        .video-section {
            max-width: 850px;
            margin: 0 auto 5rem;
            padding: 0 20px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Features Grid */
        .container { max-width: 1100px; margin: auto; padding: 0 5% 5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
