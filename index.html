<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPP Solar Club | Smart Energy Arbitrage</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #27ae60;
            --dark: #1a2a3a;
            --light: #ecf0f1;
            --accent: #f1c40f;
        }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            background-color: var(--dark);
            color: var(--light);
            text-align: center;
            line-height: 1.6;
        }

        /* Hero Section with Video */
        header {
            padding: 40px 20px;
            background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
            border-bottom: 4px solid var(--primary);
        }

        h1 { font-size: 3rem; margin-bottom: 10px; color: var(--primary); }
        .subtitle { font-size: 1.4rem; color: #bdc3c7; margin-bottom: 30px; }

        .video-container {
            max-width: 800px;
            margin: 0 auto 30px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .video-container iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
        }

        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }

        /* Profit Tracker Badge */
        .money-badge {
            display: inline-block;
            background: rgba(46, 204, 113, 0.1);
            padding: 15px 40px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
        }

        /* Demo Box */
        .demo-box {
            background: #2c3e50;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-top: 50px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: #1e272e;
            padding: 25px;
            border-radius: 12px;
            border-bottom: 4px solid var(--accent);
        }

        .btn-ai {
            background: var(--primary);
            color: white;
            padding: 20px 50px;
            border: none;
            border-radius: 10px;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-ai:hover { transform: scale(1.05); background: var(--secondary); }

        /* Table Styles */
        .table-wrapper { overflow-x: auto; margin-top: 50px; }
        table { width: 100%; border-collapse: collapse; background: #2c3e50; border-radius: 10px; overflow: hidden; }
        th, td { padding: 18px; border-bottom: 1px solid #1a2a3a; text-align: right; }
        th { background: #1e272e; color: var(--accent); }
        .highlight { color: var(--primary); font-weight: bold; }
